name: quadro_cloud
description: "Quadro Cloud - Client Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # WebView (for Paymob)
  webview_flutter: ^4.10.0

  # Firebase
  firebase_core: ^3.10.0
  firebase_messaging: ^15.1.6

  # Push notifications (foreground display)
  flutter_local_notifications: ^18.0.0

  # Social Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.6

  # File opening
  open_filex: ^4.5.0

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#4F46E5"
    theme_color: "#4F46E5"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
